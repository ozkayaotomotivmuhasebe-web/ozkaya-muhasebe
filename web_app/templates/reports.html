{% extends "base.html" %}

{% block title %}Raporlar - Muhasebe Sistemi{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <h2 class="mb-4"><i class="bi bi-graph-up"></i> Raporlar ve Analizler</h2>
    
    <div class="row">
        <div class="col-md-4 mb-3">
            <div class="card">
                <div class="card-body text-center">
                    <i class="bi bi-bar-chart-line" style="font-size: 48px; color: var(--primary-color);"></i>
                    <h5 class="mt-3">Gelir-Gider Raporu</h5>
                    <p class="text-muted">Dönemsel gelir ve gider analizi</p>
                    <button class="btn btn-primary">
                        <i class="bi bi-file-earmark-text"></i> Raporu Görüntüle
                    </button>
                </div>
            </div>
        </div>
        
        <div class="col-md-4 mb-3">
            <div class="card">
                <div class="card-body text-center">
                    <i class="bi bi-people-fill" style="font-size: 48px; color: var(--success-color);"></i>
                    <h5 class="mt-3">Cari Hesap Raporu</h5>
                    <p class="text-muted">Cari hesap bakiyeleri ve ekstre</p>
                    <button class="btn btn-success">
                        <i class="bi bi-file-earmark-text"></i> Raporu Görüntüle
                    </button>
                </div>
            </div>
        </div>
        
        <div class="col-md-4 mb-3">
            <div class="card">
                <div class="card-body text-center">
                    <i class="bi bi-bank" style="font-size: 48px; color: var(--info-color);"></i>
                    <h5 class="mt-3">Banka Raporu</h5>
                    <p class="text-muted">Banka hareketleri ve bakiyeler</p>
                    <button class="btn btn-info">
                        <i class="bi bi-file-earmark-text"></i> Raporu Görüntüle
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
